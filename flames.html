<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAMES 🔥</title>

<style>
:root {
  --bg1:#ff758c;
  --bg2:#ff7eb3;
  --card:#ffffff;
  --text:#ff4f81;
}

body.dark {
  --bg1:#0f2027;
  --bg2:#203a43;
  --card:#1e1e1e;
  --text:#00e5ff;
}

* {
  box-sizing: border-box;
  font-family: Poppins, sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg,var(--bg1),var(--bg2));
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.5s;
  overflow: hidden;
}

.container {
  background: var(--card);
  color: var(--text);
  width: 90%;
  max-width: 360px;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  animation: pop 0.7s ease;
}

@keyframes pop {
  from { transform: scale(0.8); opacity:0; }
  to { transform: scale(1); opacity:1; }
}

h1 { margin: 10px 0; }

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(135deg,#ff4f81,#ff9800);
  color: #fff;
  font-size: 17px;
  cursor: pointer;
}

button:active { transform: scale(0.95); }

.actions {
  display: flex;
  gap: 10px;
}

.actions button {
  width: 50%;
  font-size: 14px;
}

.result {
  margin-top: 15px;
  font-size: 22px;
  font-weight: bold;
  animation: fade 0.6s ease;
}

@keyframes fade {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}

.emoji {
  font-size: 40px;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

/* ❤️ Heart Rain */
.heart {
  position: fixed;
  top: -10px;
  font-size: 20px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
    opacity: 0;
  }
}

.toggle {
  font-size: 13px;
  cursor: pointer;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="title">🔥 FLAMES 🔥</h1>

  <select id="lang" onchange="setLang()">
    <option value="en">English</option>
    <option value="te">తెలుగు</option>
    <option value="hi">हिंदी</option>
  </select>

  <input id="name1" placeholder="Your Name">
  <input id="name2" placeholder="Partner Name">

  <button onclick="calculate()">Calculate 💖</button>

  <div class="actions">
    <button onclick="resetGame()">🔄 Reset</button>
    <button onclick="share()">📤 Share</button>
  </div>

  <div id="result"></div>

  <div class="toggle" onclick="toggleDark()">🌙 Toggle Dark Mode</div>
</div>

<!-- Sounds -->
<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-click-error-1110.mp3"></audio>
<audio id="loveSound" src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3"></audio>

<script>
const texts = {
  en:{
    your:"Your Name", partner:"Partner Name", flames:"FLAMES"
  },
  te:{
    your:"మీ పేరు", partner:"వారి పేరు", flames:"ఫ్లేమ్స్"
  },
  hi:{
    your:"आपका नाम", partner:"साथी का नाम", flames:"फ्लेम्स"
  }
};

function setLang(){
  const l = lang.value;
  name1.placeholder = texts[l].your;
  name2.placeholder = texts[l].partner;
  title.innerText = "🔥 " + texts[l].flames + " 🔥";
}

function calculate(){
  clickSound.play();
  let a = name1.value.trim().toLowerCase().replace(/\s/g,'').split('');
  let b = name2.value.trim().toLowerCase().replace(/\s/g,'').split('');

  if(!a.length || !b.length){ alert("Enter both names"); return; }

  for(let i=0;i<a.length;i++){
    let j = b.indexOf(a[i]);
    if(j!=-1){ a.splice(i,1); b.splice(j,1); i--; }
  }

  const flames = [
    ["Friends","🤝"],["Love","❤️"],["Affection","😊"],
    ["Marriage","💍"],["Enemies","😈"],["Siblings","👨‍👩‍👧"]
  ];

  const res = flames[(a.length+b.length-1)%6];
  loveSound.play();
  rainHearts();

  result.innerHTML = `
    <div class="result">
      <div class="emoji">${res[1]}</div>
      ${res[0]}
    </div>`;
}

function resetGame(){
  name1.value=""; name2.value="";
  result.innerHTML="";
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

function share(){
  if(!result.innerText) return alert("Calculate first!");
  const msg = `🔥 FLAMES Result 🔥\n${name1.value} ❤️ ${name2.value}\nResult: ${result.innerText}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

function rainHearts(){
  for(let i=0;i<20;i++){
    let h = document.createElement("div");
    h.className="heart";
    h.innerText="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=2+Math.random()*3+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  }
}
</script>

</body>
</html>
